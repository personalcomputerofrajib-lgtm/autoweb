name: site_builder
description: A no-code website builder for Android — drag, drop, and publish.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  flutter_colorpicker: ^1.1.0
  archive: ^3.6.1
  share_plus: ^9.0.0
  webview_flutter: ^4.7.0
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  reorderable_grid_view: ^2.2.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/templates/

